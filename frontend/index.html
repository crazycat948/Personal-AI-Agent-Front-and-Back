<!DOCTYPE html>
<html>
<head>
    <title>Yifan's Chat</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 左上角标题 */
        .header {
            padding: 15px 25px;
            font-weight: bold;
            font-size: 20px;
            background-color: white;
            border-bottom: 1px solid #ddd;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        /* 欢迎语居中 */
        .welcome {
            text-align: center;
            margin-top: 120px;
            font-size: 22px;
            color: #555;
        }

        /* 消息气泡 */
        .message {
            max-width: 60%;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 15px;
            word-wrap: break-word;
        }

        .user {
            align-self: flex-start;
            background-color: #d1e7ff;
        }

        .bot {
            align-self: flex-end;
            background-color: #e2e2e2;
        }

        /* 输入区域 */
        .input-container {
            display: flex;
            padding: 15px;
            background-color: white;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-left: 10px;
            padding: 10px 18px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="header">
        Yifan's Chat
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcomeMessage"></div>
    </div>

    <div class="input-container">
        <input type="text" id="messageInput" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const welcomeMessages = [
            "Welcome to Yifan’s Chat — what would you like to explore today?",
            "Curious about Yifan’s projects, music taste, or game world? Let’s talk.",
            "Yifan is here to chat about tech, literature, games, and beyond.",
            "Dive into Yifan’s world — what interests you today?",
            "Want to know more about Yifan’s journey, ideas, or creations?",
            "Let’s explore Yifan’s thoughts on code, culture, and creativity.",
            "Ask anything about Yifan — projects, passions, or perspectives.",
            "Step into Yifan’s digital space — what shall we discuss?"
        ];

        // 随机显示欢迎语
        document.getElementById("welcomeMessage").innerText =
            welcomeMessages[Math.floor(Math.random() * welcomeMessages.length)];

        async function sendMessage() {
            const input = document.getElementById("messageInput");
            const text = input.value.trim();
            if (text === "") return;

            const chatContainer = document.getElementById("chatContainer");

            // 如果第一次发送，移除欢迎语
            const welcome = document.getElementById("welcomeMessage");
            if (welcome) welcome.remove();

            // 用户气泡
            const userMessage = document.createElement("div");
            userMessage.className = "message user";
            userMessage.innerText = text;
            chatContainer.appendChild(userMessage);

            input.value = "";

            try {
                const response = await fetch("http://127.0.0.1:8000/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ query: text })
                });

                const data = await response.json();

                const botMessage = document.createElement("div");
                botMessage.className = "message bot";
                botMessage.innerText = data.reply;
                chatContainer.appendChild(botMessage);

                chatContainer.scrollTop = chatContainer.scrollHeight;

            } catch (error) {
                const botMessage = document.createElement("div");
                botMessage.className = "message bot";
                botMessage.innerText = "Error connecting to backend.";
                chatContainer.appendChild(botMessage);
            }
        }

        // 支持 Enter 发送
        document.getElementById("messageInput")
            .addEventListener("keypress", function(event) {
                if (event.key === "Enter") {
                    sendMessage();
                }
            });
    </script>

</body>
</html>
